name: Mistral

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, edited, labeled, assigned]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  mistral:
    runs-on: ubuntu-latest
    # Only run when the trigger phrase is present (for comment events)
    # or always run for PR/issue lifecycle events
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'issues' ||
      contains(github.event.comment.body, '@mistralai') ||
      contains(github.event.review.body, '@mistralai')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Mistral
        uses: robin-afro/mistral-action@main
        with:
          mistral_api_key: ${{ secrets.MISTRAL_API_KEY }}
          trigger_phrase: "@mistralai"
